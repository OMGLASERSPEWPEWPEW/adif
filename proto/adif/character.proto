syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

import "adif/common.proto";
import "adif/entity.proto";

// Character select screen.
message CharacterList {
  repeated CharacterSummary characters = 1;
}

message CharacterSummary {
  string name = 1;
  uint32 level = 2;
  uint32 race = 3;
  uint32 class_id = 4;
  uint32 gender = 5;
  uint32 zone_id = 6;
  uint32 deity = 7;
  uint32 face = 8;
}

message CharacterCreate {
  string name = 1;
  uint32 race = 2;
  uint32 class_id = 3;
  uint32 gender = 4;
  uint32 deity = 5;
  uint32 face = 6;
  uint32 hair_style = 7;
  uint32 hair_color = 8;
  uint32 beard_style = 9;
  uint32 beard_color = 10;
  uint32 eye_color_1 = 11;
  uint32 eye_color_2 = 12;
  uint32 start_zone = 13;

  // Starting stat allocation.
  uint32 str = 14;
  uint32 sta = 15;
  uint32 dex = 16;
  uint32 agi = 17;
  uint32 intelligence = 18;
  uint32 wis = 19;
  uint32 cha = 20;
}

message CharacterCreateResponse {
  bool success = 1;
  string error_message = 2;
}

message CharacterDelete {
  string name = 1;
}

message NameCheck {
  string name = 1;
  uint32 race = 2;
  uint32 class_id = 3;
}

message NameCheckResponse {
  bool available = 1;
  string reason = 2;
}

// Full character state sent on zone-in.
message PlayerProfile {
  string name = 1;
  string last_name = 2;
  uint32 race = 3;
  uint32 class_id = 4;
  uint32 level = 5;
  uint32 gender = 6;
  uint32 deity = 7;
  uint32 guild_id = 8;
  uint32 guild_rank = 9;

  // Attributes
  uint32 str = 10;
  uint32 sta = 11;
  uint32 dex = 12;
  uint32 agi = 13;
  uint32 intelligence = 14;
  uint32 wis = 15;
  uint32 cha = 16;

  // Vitals
  int32 current_hp = 17;
  int32 max_hp = 18;
  int32 current_mana = 19;
  int32 max_mana = 20;
  int32 current_endurance = 21;
  int32 max_endurance = 22;

  // Experience
  uint64 experience = 23;
  uint64 aa_experience = 24;
  uint32 aa_points_spent = 25;
  uint32 aa_points_unspent = 26;

  // Position
  Vec3 position = 27;
  float heading = 28;
  uint32 zone_id = 29;

  // Bind points (up to 5).
  repeated BindPoint bind_points = 30;

  // Skills (index = skill ID, value = skill level).
  repeated uint32 skills = 31;

  // Spell book slots.
  repeated uint32 spell_book = 32;

  // Memorized spell bar (8 slots).
  repeated uint32 memorized_spells = 33;

  // Active buffs.
  repeated ActiveBuff buffs = 34;

  // Currency
  Money money = 35;
  Money bank_money = 36;

  // Flags
  bool gm = 37;
  bool pvp = 38;
  bool anonymous = 39;

  // Language skills (EQ: PlayerProfile_Struct.languages[])
  repeated uint32 languages = 40;

  // Leadership (EQ: group/raid_leadership_exp/points)
  uint32 group_leadership_exp = 41;
  uint32 raid_leadership_exp = 42;
  uint32 group_leadership_points = 43;
  uint32 raid_leadership_points = 44;

  // Sustenance (EQ: hunger_level, thirst_level, intoxication)
  int32 hunger_level = 45;
  int32 thirst_level = 46;
  uint32 intoxication = 47;

  // Disciplines (EQ: Disciplines_Struct)
  repeated uint32 disciplines = 48;

  // Recast timers (index = timer type, value = seconds remaining)
  repeated uint32 recast_timers = 49;

  // Auto-split loot with group
  bool auto_split = 50;

  // Appearance data for character select / inspect
  Appearance appearance = 51;

  // Title and suffix
  string title = 52;
  string suffix = 53;

  // Cursor money (held on cursor, separate from inventory)
  Money cursor_money = 54;

  // Air remaining (underwater breath counter)
  uint32 air_remaining = 55;

  // Toxicity (from potions)
  int32 toxicity = 56;

  // Practice points (unspent stat/skill points)
  uint32 practice_points = 57;
}

message BindPoint {
  uint32 zone_id = 1;
  Vec3 position = 2;
  float heading = 3;
}

message ActiveBuff {
  uint32 spell_id = 1;
  uint32 slot = 2;
  uint32 duration_remaining = 3;
  uint32 caster_level = 4;
  int32 counters = 5;
  uint32 caster_id = 6;
}

message Money {
  uint32 platinum = 1;
  uint32 gold = 2;
  uint32 silver = 3;
  uint32 copper = 4;
}

message ExperienceUpdate {
  uint64 experience = 1;
  uint32 aa_experience = 2;
}

message LevelUpdate {
  uint32 entity_id = 1;
  uint32 new_level = 2;
}

message SkillUpdate {
  uint32 skill_id = 1;
  uint32 skill_value = 2;
}

message SaveRequest {}

message SaveConfirm {
  bool success = 1;
}

message SurnameChange {
  string surname = 1;
}

message TitleChange {
  uint32 title_id = 1;
}

message RandomName {
  uint32 race = 1;
  uint32 gender = 2;
}

message RandomNameResponse {
  string name = 1;
}
