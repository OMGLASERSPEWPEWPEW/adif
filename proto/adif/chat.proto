syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

enum ChatChannel {
  CHAT_CHANNEL_UNSPECIFIED = 0;
  CHAT_CHANNEL_SAY = 1;
  CHAT_CHANNEL_TELL = 2;
  CHAT_CHANNEL_GROUP = 3;
  CHAT_CHANNEL_GUILD = 4;
  CHAT_CHANNEL_OOC = 5;
  CHAT_CHANNEL_AUCTION = 6;
  CHAT_CHANNEL_SHOUT = 7;
}

message ChatMessage {
  string sender_name = 1;
  string target_name = 2;
  ChatChannel channel = 3;
  uint32 language = 4;
  string message = 5;
}

message Emote {
  uint32 entity_id = 1;
  string text = 2;
}

enum SystemMessageType {
  SYSTEM_MESSAGE_TYPE_UNSPECIFIED = 0;
  SYSTEM_MESSAGE_TYPE_INFO = 1;
  SYSTEM_MESSAGE_TYPE_WARNING = 2;
  SYSTEM_MESSAGE_TYPE_ERROR = 3;
  SYSTEM_MESSAGE_TYPE_COMBAT = 4;
  SYSTEM_MESSAGE_TYPE_LOOT = 5;
  SYSTEM_MESSAGE_TYPE_EXPERIENCE = 6;
}

message SystemMessage {
  SystemMessageType type = 1;
  uint32 color = 2;
  string text = 3;
}
