syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

import "adif/common.proto";

enum DamageType {
  DAMAGE_TYPE_UNSPECIFIED = 0;
  DAMAGE_TYPE_MELEE_1H_SLASH = 1;
  DAMAGE_TYPE_MELEE_1H_BLUNT = 2;
  DAMAGE_TYPE_MELEE_2H_SLASH = 3;
  DAMAGE_TYPE_MELEE_2H_BLUNT = 4;
  DAMAGE_TYPE_MELEE_PIERCE = 5;
  DAMAGE_TYPE_MELEE_HAND_TO_HAND = 6;
  DAMAGE_TYPE_RANGED = 7;
  DAMAGE_TYPE_SPELL = 8;
  DAMAGE_TYPE_ENVIRONMENTAL = 9;
}

message MeleeAttack {
  uint32 attacker_id = 1;
  uint32 target_id = 2;
  DamageType damage_type = 3;
  uint32 skill_id = 4;
}

message MeleeDamage {
  uint32 attacker_id = 1;
  uint32 target_id = 2;
  int32 damage = 3;
  DamageType damage_type = 4;
  uint32 spell_id = 5;
  Vec3 force = 6;
}

message SpellBeginCast {
  uint32 caster_id = 1;
  uint32 spell_id = 2;
  uint32 cast_time_ms = 3;
}

message SpellCast {
  uint32 caster_id = 1;
  uint32 target_id = 2;
  uint32 spell_id = 3;
  uint32 slot = 4;
}

message SpellEffect {
  uint32 caster_id = 1;
  uint32 target_id = 2;
  uint32 spell_id = 3;
  int32 value = 4;
  Vec3 force = 5;
}

message EntityDeath {
  uint32 entity_id = 1;
  uint32 killer_id = 2;
  uint32 corpse_id = 3;
  uint32 level = 4;
  uint32 spell_id = 5;
  DamageType damage_type = 6;
  int32 damage = 7;
}

message HPUpdate {
  uint32 entity_id = 1;
  int32 current_hp = 2;
  int32 max_hp = 3;
}

message BuffApply {
  uint32 entity_id = 1;
  uint32 spell_id = 2;
  uint32 caster_id = 3;
  uint32 slot = 4;
  uint32 duration_ticks = 5;
  int32 counters = 6;
  uint32 caster_level = 7;
}

message BuffFade {
  uint32 entity_id = 1;
  uint32 slot = 2;
  uint32 spell_id = 3;
}
