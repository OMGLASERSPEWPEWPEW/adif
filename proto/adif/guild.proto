syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

message GuildList {
  repeated GuildEntry guilds = 1;
}

message GuildEntry {
  uint32 guild_id = 1;
  string name = 2;
}

message GuildInvite {
  string inviter_name = 1;
  string invitee_name = 2;
  uint32 guild_id = 3;
}

message GuildInviteResponse {
  bool accepted = 1;
  uint32 guild_id = 2;
}

message GuildRemove {
  string name = 1;
  uint32 guild_id = 2;
}

message GuildDisband {
  uint32 guild_id = 1;
}

message GuildPromote {
  string name = 1;
  uint32 new_rank = 2;
}

message GuildMOTD {
  uint32 guild_id = 1;
  string motd = 2;
  string set_by = 3;
}
