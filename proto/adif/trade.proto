syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

import "adif/character.proto";

// Player-to-player trade
message TradeRequest {
  uint32 from_entity_id = 1;
  uint32 to_entity_id = 2;
}

message TradeAccept {
  uint32 entity_id = 1;
}

message TradeCancel {
  uint32 entity_id = 1;
}

message TradeItem {
  uint32 slot = 1;
  uint32 item_id = 2;
  uint32 quantity = 3;
}

message TradeMoney {
  Money amount = 1;
}

message TradeConfirm {
  uint32 entity_id = 1;
}

message TradeComplete {
  bool success = 1;
}

// NPC Merchants
message MerchantOpen {
  uint32 merchant_id = 1;
}

message MerchantClose {
  uint32 merchant_id = 1;
}

message MerchantInventory {
  uint32 merchant_id = 1;
  repeated MerchantItem items = 2;
}

message MerchantItem {
  uint32 slot = 1;
  uint32 item_id = 2;
  uint32 quantity = 3;
  uint32 price = 4;
}

message MerchantBuy {
  uint32 merchant_id = 1;
  uint32 item_id = 2;
  uint32 quantity = 3;
}

message MerchantSell {
  uint32 merchant_id = 1;
  uint32 item_id = 2;
  uint32 quantity = 3;
}

// Bazaar / Auction
message AuctionSearch {
  string search_text = 1;
  uint32 min_price = 2;
  uint32 max_price = 3;
  uint32 item_class = 4;
}

message AuctionSearchResults {
  repeated AuctionListing listings = 1;
}

message AuctionListing {
  uint32 item_id = 1;
  string item_name = 2;
  uint32 price = 3;
  string seller_name = 4;
  uint32 seller_zone_id = 5;
}

message SetupShop {
  bool active = 1;
}

message TraderPurchase {
  string seller_name = 1;
  uint32 item_id = 2;
  uint32 price = 3;
}
