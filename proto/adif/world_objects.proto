syntax = "proto3";

package adif;

option csharp_namespace = "Adif.Protocol";

import "adif/common.proto";

// Doors
message DoorSpawn {
  uint32 door_id = 1;
  string name = 2;
  Vec3 position = 3;
  float heading = 4;
  uint32 open_type = 5;
  uint32 key_item_id = 6;
  bool is_open = 7;
  float size = 8;
}

message DoorDespawn {
  uint32 door_id = 1;
}

message DoorInteract {
  uint32 door_id = 1;
  uint32 entity_id = 2;
  uint32 key_item_id = 3;
}

message DoorStateChange {
  uint32 door_id = 1;
  bool is_open = 2;
}

// Ground items
message GroundItem {
  uint32 drop_id = 1;
  uint32 item_id = 2;
  Vec3 position = 3;
  float heading = 4;
  string object_name = 5;
  uint32 charges = 6;
}

message GroundItemDespawn {
  uint32 drop_id = 1;
}

// Interactable objects (forges, looms, etc.)
message ObjectInteract {
  uint32 object_id = 1;
  uint32 entity_id = 2;
}

message ObjectRemove {
  uint32 object_id = 1;
}

// Vehicles (boats, etc.)
message VehicleBoard {
  uint32 vehicle_id = 1;
  uint32 entity_id = 2;
}

message VehicleExit {
  uint32 vehicle_id = 1;
  uint32 entity_id = 2;
}
